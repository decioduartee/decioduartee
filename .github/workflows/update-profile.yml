name: Update GitHub Profile

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - today.py

  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: github-profile
  cancel-in-progress: true

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: |
          pip install requests
          pip install python-dateutil
          pip install lxml

      - name: Generate SVG
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: decioduartee
        run: python today.py

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update profile statistics
          file_pattern: dark_mode.svg light_mode.svg cache/*